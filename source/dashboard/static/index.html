<!DOCTYPE html>
<html>

<head>
    <title>Mars IoT Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
        }

        h1 {
            color: #bb86fc;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .connect-status {
            color: #ffeb3b;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-section {
            flex: 1 1 400px;
            /* Minimo 400px, poi si espande */
            background: #1e1e1e;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .category-title {
            color: #03dac6;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .sensor-card {
            background: #2c2c2c;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #bb86fc;
            transition: background-color 0.3s;
        }

        .sensor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .sensor-name {
            font-weight: bold;
            color: #ffffff;
            font-size: 1.1em;
        }

        .sensor-status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-ok {
            background-color: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-warning {
            background-color: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .status-error {
            background-color: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            margin: 4px 0;
            padding: 4px 0;
            border-bottom: 1px dashed #444;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-name {
            color: #aaaaaa;
        }

        .metric-value {
            color: #cf6679;
            font-weight: bold;
            font-size: 1.1em;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75em;
            color: #666;
        }
    </style>
</head>

<body>
    <h1>MARS IoT Dashboard</h1>
    <div class="subtitle">Visualizzazione in tempo reale dello stato dei sensori</div>
    <div id="status" class="connect-status">Connessione in corso...</div>

    <div class="dashboard-container" id="dashboard">
        <!-- Le categorie verranno generate dinamicamente qui -->
    </div>

    <script>
        // Mappa per tradurre e raggruppare i sensori in categorie logiche (Sensori fissi REST)
        const CATEGORIES = {
            "Solar Array": ["solar_array_solar_array"],
            "Environment (Serra & Corridoi)": ["greenhouse_temperature", "entrance_humidity", "corridor_pressure"],
            "Air Quality": ["co2_hall", "air_quality_pm25", "air_quality_voc"],
            "Water & Hydroponics": ["hydroponic_ph", "water_tank_level"]
        };

        // Mappa per i sensori di Telemetria che generano ID dinamici (es. solar_array_subsystem1)
        const CATEGORY_PREFIXES = {
            "Power & Energy": ["power_bus", "power_consumption"],
            "Thermal Management": ["thermal_loop"],
            "Life Support & Environment": ["life_support"],
            "Airlock & Exterior": ["airlock", "radiation"]
        };

        // Struttura dati per memorizzare l'ultimo stato (caching lato client)
        const latestState = {};

        const ws = new WebSocket("ws://" + location.host + "/ws");
        const statusDiv = document.getElementById('status');

        ws.onopen = function () {
            statusDiv.innerText = "✅ Connesso in Real-Time al Broker (In attesa dati...)";
            statusDiv.style.color = "#4caf50";
        };

        ws.onclose = function () {
            statusDiv.innerText = "❌ Disconnesso dal Server. Ricarica la pagina.";
            statusDiv.style.color = "#f44336";
        };

        function getCategoryForSensor(sensorId) {
            // 1. Controllo esatto (Sensori REST statici)
            for (const [category, sensors] of Object.entries(CATEGORIES)) {
                if (sensors.includes(sensorId)) return category;
            }

            // 2. Controllo per prefisso (Sensori Telemetria dinamici)
            for (const [category, prefixes] of Object.entries(CATEGORY_PREFIXES)) {
                for (const prefix of prefixes) {
                    if (sensorId.startsWith(prefix)) return category;
                }
            }

            return "Other Subsystems";
        }

        function getStatusClass(status) {
            if (!status) return 'status-ok';
            const s = status.toLowerCase();
            if (s === 'ok') return 'status-ok';
            if (s === 'error' || s === 'critical') return 'status-error';
            return 'status-warning';
        }

        function renderDashboard() {
            const container = document.getElementById('dashboard');
            container.innerHTML = ''; // Svuota

            // Macro-categorie richieste dall'utente
            const MACRO_GROUPS = {
                "REST": { title: "SENSORS (Rest)", color: "#bb86fc" },
                "TELEMETRY": { title: "TELEMETRY", color: "#03dac6" },
                "ACTUATORS": { title: "ACTUATORS", color: "#ff9800" }
            };

            // Prepariamo la struttura dati: Macro -> SubCategory -> Sensors
            const organizedData = {
                "REST": {},
                "TELEMETRY": {},
                "ACTUATORS": {}
            };

            for (const [sensorId, sensorData] of Object.entries(latestState)) {
                // Se il protocollo è ACTUATORS, lo mettiamo nella macro-sezione Actuators
                const proto = sensorData.source_protocol || "REST";
                let cat = getCategoryForSensor(sensorId);
                
                // Se è un attuatore, mettiamolo in una sottocategoria fissa
                if (proto === "ACTUATORS") {
                    cat = "Habitat Infrastructure";
                }
                
                if (!organizedData[proto]) organizedData[proto] = {};
                if (!organizedData[proto][cat]) organizedData[proto][cat] = {};
                
                organizedData[proto][cat][sensorId] = sensorData;
            }

            // Rendere le Macro-Categorie
            for (const [proto, macroInfo] of Object.entries(MACRO_GROUPS)) {
                if (Object.keys(organizedData[proto]).length === 0) continue;

                // Container per la macro-categoria
                const macroWrapper = document.createElement('div');
                macroWrapper.style.width = '100%';
                macroWrapper.style.marginBottom = '40px';
                
                const macroHeader = document.createElement('h2');
                macroHeader.style.color = macroInfo.color;
                macroHeader.style.borderBottom = `2px solid ${macroInfo.color}`;
                macroHeader.style.paddingBottom = '10px';
                macroHeader.style.marginLeft = '10px';
                macroHeader.innerText = macroInfo.title;
                macroWrapper.appendChild(macroHeader);

                const macroContainer = document.createElement('div');
                macroContainer.className = 'dashboard-container';
                macroWrapper.appendChild(macroContainer);

                // Sotto-categorie all'interno della macro
                for (const [category, sensors] of Object.entries(organizedData[proto])) {
                    const section = document.createElement('div');
                    section.className = 'category-section';
                    section.style.borderColor = macroInfo.color;

                    const title = document.createElement('h3');
                    title.className = 'category-title';
                    title.style.color = macroInfo.color;
                    title.innerText = category;
                    section.appendChild(title);

                    // Card sensori
                    for (const [sensorId, sensorObj] of Object.entries(sensors)) {
                        if (Object.keys(sensorObj.metrics).length === 0) continue;

                        const card = document.createElement('div');
                        card.className = 'sensor-card';
                        card.style.borderLeftColor = macroInfo.color;

                        if (Date.now() - new Date(sensorObj.timestamp).getTime() < 1000) {
                            card.style.backgroundColor = '#3d3d3d';
                            setTimeout(() => card.style.backgroundColor = '', 500);
                        }

                        const rawDate = new Date(sensorObj.timestamp);
                        const timeStr = rawDate.toLocaleTimeString();

                        let html = `
                            <div class="sensor-header">
                                <span class="sensor-name">${sensorId.replace(/_/g, ' ').toUpperCase()}</span>
                                <span class="sensor-status ${getStatusClass(sensorObj.status)}">${sensorObj.status || 'OK'}</span>
                            </div>
                        `;

                        for (const [metricName, metricData] of Object.entries(sensorObj.metrics).sort()) {
                            let displayVal = metricData.value;
                            if (typeof displayVal === 'number' && !Number.isInteger(displayVal)) {
                                displayVal = displayVal.toFixed(2);
                            }

                            html += `
                                <div class="metric-row">
                                    <span class="metric-name">${metricName}</span>
                                    <span class="metric-value">${displayVal} <span style="font-size:0.75em; color:#888;">${metricData.unit || ''}</span></span>
                                </div>
                            `;
                        }

                        html += `
                            <div class="footer-info">
                                <span>Ultimo agg: ${timeStr}</span>
                            </div>
                        `;

                        card.innerHTML = html;
                        section.appendChild(card);
                    }
                    
                    if (section.querySelectorAll('.sensor-card').length > 0) {
                        macroContainer.appendChild(section);
                    }
                }
                
                if (macroContainer.children.length > 0) {
                    container.appendChild(macroWrapper);
                }
            }
        }

        ws.onmessage = function (event) {
            try {
                const data = JSON.parse(event.data);
                const sid = data.sensor_id;

                // Filtro per visualizzare solo le metriche richieste nella Use Story per il Solar Array
                if (sid === "solar_array_solar_array") {
                    if (!["kW", "V", "A"].includes(data.unit)) {
                        return; // Scarta le metriche come kWh, stato, ecc.
                    }
                }

                // Se non abbiamo ancora questo sensore, inizializzalo
                if (!latestState[sid]) {
                    latestState[sid] = {
                        metrics: {}
                    };
                }

                // Aggiorna i dati generali
                latestState[sid].timestamp = data.timestamp;
                latestState[sid].status = data.status;
                latestState[sid].source_protocol = data.source_protocol;

                // Aggiorna/Aggiungi questa specifica metrica
                // (Ricorda che l'ingestion emette eventi separati per ogni metrica dello stesso sensore)
                if (data.metric) {
                    latestState[sid].metrics[data.metric] = {
                        value: data.value,
                        unit: data.unit
                    };
                }

                // Ridisegna la UI
                renderDashboard();
            } catch (e) {
                console.error("Errore parsing:", e, event.data);
            }
        };
    </script>
</body>

</html>
